# ── Power Management ──────────────────────────────────────────────────────────

# Time (ms) of inactivity before the idle state is triggered
# 2 minutes = 120,000 ms
CONFIG_ZMK_IDLE_TIMEOUT=120000

# Enable mouse emulation (pointer/scroll support)
CONFIG_ZMK_POINTING=y

# Enable deep sleep after idle
CONFIG_ZMK_SLEEP=y

# Time (ms) after idle before deep sleep kicks in
# 15 minutes = 900,000 ms
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── RGB ───────────────────────────────────────────────────────────────────────

# Enable RGB underglow (per-key LEDs on Corne Choc Pro BT)
CONFIG_ZMK_RGB_UNDERGLOW=y

# Disable RGB at startup — layers will turn it on automatically
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Turn off RGB when idle (saves battery)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Set brightness to 40% by default (balances visibility vs battery)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# ── Bluetooth ─────────────────────────────────────────────────────────────────

# Improves BT stability on macOS
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Optional ──────────────────────────────────────────────────────────────────

# Keyboard name shown to the OS (max 16 chars)
CONFIG_ZMK_KEYBOARD_NAME="Dean's KB"
